name: OI Dashboard Auto-Fetch

on:
  schedule:
    # Runs every 5 minutes Mon-Fri between 9:00 AM and 3:30 PM IST
    # IST = UTC+5:30, so 9:00 IST = 3:30 UTC, 15:30 IST = 10:00 UTC
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch:   # allows manual trigger from GitHub website anytime

jobs:
  fetch-oi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests gspread google-auth

      - name: Run OI fetcher
        env:
          DHAN_CLIENT_ID:    ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: python fetch_oi.py
