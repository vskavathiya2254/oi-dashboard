name: OI Dashboard Auto-Fetch

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes, all day, every day
  workflow_dispatch:          # also allows manual trigger from GitHub website

jobs:
  fetch-oi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests gspread gspread-formatting google-auth

      - name: Run OI fetcher
        env:
          DHAN_CLIENT_ID:    ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: python fetch_oi.py
